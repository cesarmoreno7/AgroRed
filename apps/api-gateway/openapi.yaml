  /api/v1/notifications:
    get:
      summary: Listar notificaciones
      tags: [Notifications]
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20, maximum: 100 }
      responses:
        "200":
          description: Lista paginada de notificaciones

  /api/v1/ml/decision-support:
    get:
      summary: Apoyo a decision territorial
      tags: [ML]
      parameters:
        - name: tenantId
          in: query
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Reporte con clasificacion y recomendaciones

  /api/v1/ml/recommendations:
    get:
      summary: Recomendaciones operativas
      tags: [ML]
      parameters:
        - name: tenantId
          in: query
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Lista de recomendaciones

  /api/v1/automation/execute:
    post:
      summary: Ejecutar corrida de automatizacion
      tags: [Automation]
      responses:
        "201":
          description: Corrida ejecutada
        "400":
          description: Payload invalido

  /api/v1/automation:
    get:
      summary: Listar corridas de automatizacion
      tags: [Automation]
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20, maximum: 100 }
      responses:
        "200":
          description: Lista paginada de corridas

  /api/v1/audit:
    get:
      summary: Consultar log de auditoria (admin)
      tags: [Audit]
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 50, maximum: 200 }
      responses:
        "200":
          description: Log de auditoria paginado
        "403":
          description: Sin permisos

