  /api/v1/analytics/summary:
    get:
      summary: Resumen analitico operativo
      tags: [Analytics]
      parameters:
        - name: tenantId
          in: query
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Dashboard con indicadores

  /api/v1/analytics/territorial-overview:
    get:
      summary: Panorama territorial
      tags: [Analytics]
      parameters:
        - name: tenantId
          in: query
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Resumen territorial

  /api/v1/analytics/map/{layer}:
    get:
      summary: Capa geoespacial GeoJSON
      tags: [Analytics Map]
      parameters:
        - name: layer
          in: path
          required: true
          schema:
            type: string
            enum: [producers, offers, canteens, rescues, incidents, demands, resources]
        - name: bbox
          in: query
          schema: { type: string }
      responses:
        "200":
          description: GeoJSON FeatureCollection

  /api/v1/analytics/map/nearby/producers:
    get:
      summary: Productores cercanos (PostGIS)
      tags: [Analytics Map]
      parameters:
        - name: lng
          in: query
          required: true
          schema: { type: number }
        - name: lat
          in: query
          required: true
          schema: { type: number }
        - name: radiusKm
          in: query
          schema: { type: number, default: 10 }
      responses:
        "200":
          description: GeoJSON de productores cercanos

  /api/v1/analytics/map/hierarchy/departamentos:
    get:
      summary: Departamentos (poligonos GeoJSON)
      tags: [Analytics Map]
      responses:
        "200":
          description: GeoJSON FeatureCollection

  /api/v1/analytics/map/hierarchy/municipios:
