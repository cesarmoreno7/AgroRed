  /api/v1/demands/register:
    post:
      summary: Registrar demanda institucional
      tags: [Demands]
      responses:
        "201":
          description: Demanda registrada
        "400":
          description: Payload invalido

  /api/v1/demands:
    get:
      summary: Listar demandas
      tags: [Demands]
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
