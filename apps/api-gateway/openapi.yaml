  /api/v1/logistics/tracking/history/{recursoId}:
    get:
      summary: Historial GPS de un recurso
      tags: [Logistics Tracking]
      parameters:
        - name: recursoId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
