  /api/v1/logistics/resources/register:
    post:
      summary: Registrar recurso de transporte
      tags: [Logistics Tracking]
      responses:
        "201":
          description: Recurso registrado

  /api/v1/logistics/resources:
    get:
      summary: Listar recursos
      tags: [Logistics Tracking]
      responses:
        "200":
          description: Lista de recursos

  /api/v1/logistics/tracking/position:
    post:
      summary: Registrar posicion GPS
      tags: [Logistics Tracking]
      responses:
        "201":
