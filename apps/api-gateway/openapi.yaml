      tags: [Logistics]
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20, maximum: 100 }
      responses:
        "200":
          description: Lista paginada de ordenes

  /api/v1/logistics/{id}:
    get:
      summary: Obtener orden logistica por ID
      tags: [Logistics]
      parameters:
        - name: id
