openapi: 3.1.0
info:
  title: AGRORED API Gateway
  version: 0.1.0
  description: Punto de entrada del ecosistema AGRORED para enrutar peticiones a los microservicios.
servers:
  - url: http://localhost:8080

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            correlationId:
              type: string
              nullable: true
    PaginatedResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: array
          items: {}
        meta:
          type: object
          properties:
            total:
              type: integer
            page:
              type: integer
            limit:
              type: integer
    UserRegisterPayload:
      type: object
      required: [tenantId, email, fullName, role, password]
      properties:
        tenantId:
          type: string
        email:
          type: string
          format: email
        fullName:
          type: string
          minLength: 3
        role:
          type: string
          enum: [admin_municipal, producer, supermarket, community_kitchen, logistics_operator, territorial_analyst]
        password:
          type: string
          minLength: 8
    LoginPayload:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

security:
  - BearerAuth: []

paths:
  /health:
    get:
      summary: Healthcheck del API Gateway
      security: []
      responses:
        "200":
          description: Gateway y servicios activos
        "503":
          description: Uno o mas servicios degradados

  /api/v1/catalog/services:
    get:
      summary: Catalogo de servicios registrados en el gateway
      security: []
      responses:
        "200":
          description: Lista de microservicios y prefijos disponibles

  /api/v1/users/register:
    post:
      summary: Registrar usuario
      security: []
      tags: [Users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserRegisterPayload"
      responses:
        "201":
          description: Usuario registrado
        "400":
          description: Payload invalido
        "409":
          description: Email ya existe

  /api/v1/users/login:
    post:
      summary: Iniciar sesion
      security: []
      tags: [Users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginPayload"
      responses:
        "200":
          description: JWT token
        "401":
          description: Credenciales invalidas

  /api/v1/users:
    get:
      summary: Listar usuarios (admin)
      tags: [Users]
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20, maximum: 100 }
      responses:
        "200":
          description: Lista paginada de usuarios
        "403":
          description: Sin permisos

  /api/v1/users/{id}:
    get:
      summary: Obtener usuario por ID
      tags: [Users]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Detalle del usuario
        "404":
          description: No encontrado

  /api/v1/producers/register:
    post:
      summary: Registrar productor
      tags: [Producers]
      responses:
        "201":
          description: Productor registrado
        "400":
          description: Payload invalido
        "409":
          description: Productor ya existe

  /api/v1/producers:
    get:
      summary: Listar productores
      tags: [Producers]
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20, maximum: 100 }
      responses:
        "200":
          description: Lista paginada de productores

  /api/v1/producers/{id}:
    get:
      summary: Obtener productor por ID
      tags: [Producers]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Detalle del productor
        "404":
          description: No encontrado

  /api/v1/offers/publish:
    post:
      summary: Publicar oferta alimentaria
      tags: [Offers]
      responses:
        "201":
          description: Oferta publicada
        "400":
          description: Payload invalido

  /api/v1/offers:
