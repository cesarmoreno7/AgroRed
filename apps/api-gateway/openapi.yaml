  /api/v1/logistics/tracking/positions/batch:
    post:
      summary: Registrar posiciones GPS en lote (max 100)
      tags: [Logistics Tracking]
      responses:
        "201":
          description: Posiciones registradas

  /api/v1/logistics/tracking/active:
    get:
      summary: Recursos activos en mapa
      tags: [Logistics Tracking]
      responses:
        "200":
